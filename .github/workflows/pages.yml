name: Deploy to GitHub Pages

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build-and-deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 GBDK-2020
        run: |
          curl -L -o gbdk.tar.gz https://github.com/gbdk-2020/gbdk-2020/releases/latest/download/gbdk-linux-x64.tar.gz
          tar -xzf gbdk.tar.gz
          mv gbdk /opt/gbdk
          echo "GBDK_HOME=/opt/gbdk" >> $GITHUB_ENV

      - name: 构建游戏
        run: |
          make clean
          make GBDK_HOME=/opt/gbdk ARCH=sm83:gb

      - name: 复制 GB 文件到 docs
        run: |
          cp 2048.gb docs/

      - name: 设置 Pages
        uses: actions/configure-pages@v4

      - name: 上传 Pages 产物
        uses: actions/upload-pages-artifact@v3
        with:
          path: './docs'

      - name: 部署到 GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
