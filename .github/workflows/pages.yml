name: Deploy to GitHub Pages

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build-and-deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 GBDK-2020
        run: |
          # 使用 GitHub API 获取最新 release 的下载链接 (x86_64 版本)
          LATEST_JSON=$(curl -s https://api.github.com/repos/gbdk-2020/gbdk-2020/releases/latest)
          DOWNLOAD_URL=$(echo "$LATEST_JSON" | grep -o '"browser_download_url": "[^"]*linux[^"]*\.tar\.gz"' | grep -v 'arm64' | head -1 | cut -d'"' -f4)
          echo "Downloading: $DOWNLOAD_URL"
          curl -L -o gbdk.tar.gz "$DOWNLOAD_URL"
          tar -xzf gbdk.tar.gz
          mv gbdk /opt/gbdk
          echo "GBDK_HOME=/opt/gbdk" >> $GITHUB_ENV

      - name: 构建游戏
        run: |
          make clean
          make GBDK_HOME=/opt/gbdk ARCH=sm83:gb
          ls -la *.gb
          echo "GB file size: $(stat -c%s 2048.gb 2>/dev/null || stat -f%z 2048.gb) bytes"

      - name: 准备部署文件
        run: |
          mkdir -p deploy
          # 使用 tag 作为版本号
          VERSION=${GITHUB_REF#refs/tags/}
          ROM_FILE="2048-${VERSION}.gb"
          cp -v 2048.gb "deploy/${ROM_FILE}"
          # 更新 index.html 中的 ROM 文件名和 meta 标签
          sed -i "s/2048\.gb/${ROM_FILE}/g" docs/index.html
          # 添加或更新 meta 标签
          if grep -q 'meta name="rom-version"' docs/index.html; then
            sed -i "s/<meta name=\"rom-version\" content=\".*\">/<meta name=\"rom-version\" content=\"${VERSION}\">/g" docs/index.html
          else
            sed -i 's|<title>|<meta name="rom-version" content="'${VERSION}'">\n    <title>|g' docs/index.html
          fi
          cp -v docs/index.html deploy/
          ls -la deploy/
          echo "Deploy contents:"
          for f in deploy/*; do echo "  $f: $(stat -c%s "$f" 2>/dev/null || stat -f%z "$f") bytes"; done
          # 恢复 index.html
          git checkout docs/index.html 2>/dev/null || true

      - name: 设置 Pages
        uses: actions/configure-pages@v4

      - name: 上传 Pages 产物
        uses: actions/upload-pages-artifact@v3
        with:
          path: './deploy'

      - name: 部署到 GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
