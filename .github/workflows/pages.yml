name: Deploy to GitHub Pages

on:
  release:
    types: [published]
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 下载最新 Release 的 GB 文件
        run: |
          # 获取最新 release
          LATEST_RELEASE=$(curl -s https://api.github.com/repos/${{ github.repository }}/releases/latest)
          
          # 获取 .gb 文件下载链接
          GB_URL=$(echo "$LATEST_RELEASE" | grep -o '"browser_download_url": "[^"]*\.gb"' | head -1 | cut -d'"' -f4)
          
          if [ -n "$GB_URL" ]; then
            echo "下载 GB 文件：$GB_URL"
            curl -L -o docs/2048.gb "$GB_URL"
          else
            echo "未找到 GB 文件，尝试从 release body 解析"
            # 尝试从 release body 中解析文件名
            GB_FILE=$(echo "$LATEST_RELEASE" | grep -o '"name": "2048-[^"]*\.gb"' | head -1 | cut -d'"' -f4)
            if [ -n "$GB_FILE" ]; then
              TAG=$(echo "$LATEST_RELEASE" | grep -o '"tag_name": "[^"]*"' | head -1 | cut -d'"' -f4)
              GB_URL="https://github.com/${{ github.repository }}/releases/download/${TAG}/${GB_FILE}"
              echo "下载 GB 文件：$GB_URL"
              curl -L -o docs/2048.gb "$GB_URL"
            fi
          fi
          
          ls -la docs/

      - name: 设置 Pages
        uses: actions/configure-pages@v4

      - name: 上传 Pages 产物
        uses: actions/upload-pages-artifact@v3
        with:
          path: './docs'

      - name: 部署到 GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
