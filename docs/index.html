<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2048 Game Boy - 在线游玩</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            color: #fff;
        }
        h1 { margin-bottom: 10px; font-size: 2rem; }
        .version-info {
            background: rgba(255,255,255,0.1);
            padding: 8px 16px;
            border-radius: 20px;
            margin-bottom: 20px;
        }
        .game-frame {
            background: #2d2d44;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
        }
        #game-container {
            width: 640px;
            height: 576px;
            max-width: 100%;
            background: #000;
            border-radius: 10px;
            overflow: hidden;
        }
        .controls-info {
            margin-top: 20px;
            background: rgba(255,255,255,0.1);
            padding: 15px 25px;
            border-radius: 10px;
            text-align: center;
        }
        .key-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
            gap: 10px;
            margin-top: 10px;
        }
        .key-item {
            background: rgba(255,255,255,0.1);
            padding: 8px 12px;
            border-radius: 5px;
            font-size: 0.85rem;
        }
        .key-item kbd {
            background: #4a4a6a;
            padding: 3px 8px;
            border-radius: 4px;
            font-family: monospace;
            margin-right: 5px;
        }
        .links {
            margin-top: 20px;
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            justify-content: center;
        }
        .links a {
            color: #4fc3f7;
            text-decoration: none;
            padding: 8px 16px;
            background: rgba(79, 195, 247, 0.1);
            border-radius: 20px;
        }
        .error {
            background: rgba(244, 67, 54, 0.2);
            border: 1px solid #f44336;
            padding: 15px 20px;
            border-radius: 10px;
            margin-top: 20px;
            color: #ef5350;
            display: none;
        }
        .loading {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100%;
            color: #888;
        }
    </style>
</head>
<body>
    <h1>🎮 2048 Game Boy</h1>
    <div class="version-info" id="versionInfo">正在加载游戏...</div>

    <div class="game-frame">
        <div id="game-container">
            <div class="loading">正在加载模拟器...</div>
        </div>
    </div>

    <div class="controls-info">
        <h3>🎯 操作说明</h3>
        <div class="key-grid">
            <div class="key-item"><kbd>↑↓←→</kbd> 方向键</div>
            <div class="key-item"><kbd>Z</kbd> A 键</div>
            <div class="key-item"><kbd>X</kbd> B 键</div>
            <div class="key-item"><kbd>Enter</kbd> Start</div>
            <div class="key-item"><kbd>Shift</kbd> Select</div>
        </div>
    </div>

    <div class="links">
        <a href="https://github.com/Cabriter/gb-2048" target="_blank">GitHub</a>
        <a href="https://github.com/Cabriter/gb-2048/releases" target="_blank">Releases</a>
    </div>

    <div id="error" class="error"></div>

    <script>
        const ROM_FILE = '2048.gb';
        
        // 使用 Ruffle/EmulatorJS 的替代方案
        async function loadEmulator() {
            const container = document.getElementById('game-container');
            const versionInfo = document.getElementById('versionInfo');
            const errorEl = document.getElementById('error');
            
            try {
                // 动态加载 EmulatorJS
                await new Promise((resolve, reject) => {
                    const script = document.createElement('script');
                    script.src = 'https://unpkg.com/emulatorjs@latest/data/emulator.min.js';
                    script.onload = resolve;
                    script.onerror = () => reject(new Error('EmulatorJS 加载失败'));
                    document.head.appendChild(script);
                });
                
                versionInfo.textContent = '正在加载 ROM...';
                
                // 配置
                window.EJS_player = '#game-container';
                window.EJS_gameUrl = ROM_FILE;
                window.EJS_core = 'gb';
                window.EJS_pathtodata = 'https://unpkg.com/emulatorjs@latest/data/';
                window.EJS_startOnLoaded = true;
                window.EJS_color = '#4fc3f7';
                window.EJS_enableCheats = false;
                
                console.log('EmulatorJS 配置完成');
                
                // 等待初始化
                setTimeout(() => {
                    if (window.EJS_emulator) {
                        versionInfo.textContent = '🎮 游戏运行中';
                        console.log('游戏已启动');
                    } else {
                        throw new Error('模拟器初始化超时');
                    }
                }, 3000);
                
            } catch (error) {
                console.error('加载失败:', error);
                errorEl.textContent = '⚠️ ' + error.message + ' - 请刷新页面重试';
                errorEl.style.display = 'block';
                versionInfo.textContent = '加载失败';
            }
        }
        
        loadEmulator();
    </script>
</body>
</html>
