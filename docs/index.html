<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2048 Game Boy - 在线游玩</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            color: #fff;
        }
        h1 { margin-bottom: 10px; font-size: 2rem; }
        .version-info {
            background: rgba(255,255,255,0.1);
            padding: 8px 16px;
            border-radius: 20px;
            margin-bottom: 20px;
        }
        .game-frame {
            background: #2d2d44;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
        }
        iframe {
            border: none;
            border-radius: 10px;
            background: #000;
        }
        .controls-info {
            margin-top: 20px;
            background: rgba(255,255,255,0.1);
            padding: 15px 25px;
            border-radius: 10px;
            text-align: center;
        }
        .key-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 10px;
            margin-top: 10px;
        }
        .key-item {
            background: rgba(255,255,255,0.1);
            padding: 8px 12px;
            border-radius: 5px;
            font-size: 0.85rem;
        }
        .key-item kbd {
            background: #4a4a6a;
            padding: 3px 8px;
            border-radius: 4px;
            font-family: monospace;
            margin-right: 5px;
        }
        .links {
            margin-top: 20px;
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            justify-content: center;
        }
        .links a {
            color: #4fc3f7;
            text-decoration: none;
            padding: 8px 16px;
            background: rgba(79, 195, 247, 0.1);
            border-radius: 20px;
        }
        .error {
            background: rgba(244, 67, 54, 0.2);
            border: 1px solid #f44336;
            padding: 15px 20px;
            border-radius: 10px;
            margin-top: 20px;
            color: #ef5350;
            display: none;
        }
    </style>
</head>
<body>
    <h1>🎮 2048 Game Boy</h1>
    <div class="version-info" id="versionInfo">正在加载游戏...</div>

    <div class="game-frame">
        <iframe id="game-frame" width="640" height="576" src="about:blank"></iframe>
    </div>

    <div class="controls-info">
        <h3>🎯 操作说明</h3>
        <div class="key-grid">
            <div class="key-item"><kbd>↑↓←→</kbd> 方向键</div>
            <div class="key-item"><kbd>Z</kbd> A 键</div>
            <div class="key-item"><kbd>X</kbd> B 键</div>
            <div class="key-item"><kbd>Enter</kbd> Start</div>
            <div class="key-item"><kbd>Shift</kbd> Select</div>
        </div>
    </div>

    <div class="links">
        <a href="https://github.com/Cabriter/gb-2048" target="_blank">GitHub</a>
        <a href="https://github.com/Cabriter/gb-2048/releases" target="_blank">Releases</a>
    </div>

    <div id="error" class="error"></div>

    <script>
        const ROM_FILE = '2048.gb';
        
        // 使用 lzh995535 的 JS Game Boy 模拟器
        const emulatorHTML = `
<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <style>
        * { margin: 0; padding: 0; }
        body { background: #000; display: flex; justify-content: center; align-items: center; height: 100vh; }
        canvas { image-rendering: pixelated; max-width: 100%; max-height: 100%; }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>
    <script src="https://cdn.jsdelivr.net/gh/lzh995535/js-gameboy@master/dist/js-gameboy.min.js"><\/script>
    <script>
        const gb = new GameBoy(document.getElementById('canvas'), '${ROM_FILE}', {
            width: 160,
            height: 144,
            scale: 4,
            autoStart: true
        });
        gb.load().then(() => {
            gb.start();
            console.log('Game loaded!');
        }).catch(err => {
            console.error('Load failed:', err);
        });
    <\/script>
</body>
</html>`;

        // 加载模拟器
        function loadEmulator() {
            const iframe = document.getElementById('game-frame');
            const blob = new Blob([emulatorHTML], { type: 'text/html' });
            iframe.src = URL.createObjectURL(blob);
            
            iframe.onload = () => {
                document.getElementById('versionInfo').textContent = '游戏运行中';
                console.log('模拟器加载完成');
            };
            
            iframe.onerror = () => {
                document.getElementById('error').textContent = '⚠️ 模拟器加载失败，请刷新页面';
                document.getElementById('error').style.display = 'block';
            };
            
            // 超时检测
            setTimeout(() => {
                if (document.getElementById('versionInfo').textContent === '正在加载游戏...') {
                    document.getElementById('error').textContent = '⚠️ 加载超时，请刷新页面';
                    document.getElementById('error').style.display = 'block';
                }
            }, 10000);
        }

        // 启动
        loadEmulator();
    </script>
</body>
</html>
