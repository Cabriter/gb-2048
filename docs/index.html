<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2048 Game Boy - 在线游玩</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            color: #fff;
        }

        h1 {
            margin-bottom: 10px;
            font-size: 2rem;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }

        .version-info {
            background: rgba(255,255,255,0.1);
            padding: 8px 16px;
            border-radius: 20px;
            margin-bottom: 20px;
            font-size: 0.9rem;
        }

        .game-container {
            background: #2d2d44;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
        }

        #game {
            border-radius: 10px;
            overflow: hidden;
        }

        .controls-info {
            margin-top: 20px;
            background: rgba(255,255,255,0.1);
            padding: 15px 25px;
            border-radius: 10px;
            text-align: center;
        }

        .controls-info h3 {
            margin-bottom: 10px;
            font-size: 1.1rem;
        }

        .key-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 10px;
            margin-top: 10px;
        }

        .key-item {
            background: rgba(255,255,255,0.1);
            padding: 8px 12px;
            border-radius: 5px;
            font-size: 0.85rem;
        }

        .key-item kbd {
            background: #4a4a6a;
            padding: 3px 8px;
            border-radius: 4px;
            font-family: monospace;
            margin-right: 5px;
        }

        .links {
            margin-top: 20px;
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .links a {
            color: #4fc3f7;
            text-decoration: none;
            padding: 8px 16px;
            background: rgba(79, 195, 247, 0.1);
            border-radius: 20px;
            transition: all 0.3s;
        }

        .links a:hover {
            background: rgba(79, 195, 247, 0.2);
            transform: translateY(-2px);
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: #888;
        }

        .loading-spinner {
            border: 3px solid rgba(255,255,255,0.1);
            border-top-color: #4fc3f7;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 15px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .error {
            background: rgba(244, 67, 54, 0.2);
            border: 1px solid #f44336;
            padding: 15px 20px;
            border-radius: 10px;
            margin-top: 20px;
            color: #ef5350;
        }

        @media (max-width: 600px) {
            h1 { font-size: 1.5rem; }
            .game-container { padding: 10px; }
        }
    </style>
</head>
<body>
    <h1>🎮 2048 Game Boy</h1>
    <div class="version-info" id="versionInfo">正在加载版本信息...</div>

    <div class="game-container">
        <div id="game">
            <div class="loading">
                <div class="loading-spinner"></div>
                <div>正在加载模拟器...</div>
            </div>
        </div>
    </div>

    <div class="controls-info">
        <h3>🎯 操作说明</h3>
        <div class="key-grid">
            <div class="key-item"><kbd>↑↓←→</kbd> 方向键移动</div>
            <div class="key-item"><kbd>Z</kbd> A 键 (开始/重置)</div>
            <div class="key-item"><kbd>X</kbd> B 键</div>
            <div class="key-item"><kbd>Enter</kbd> Start 键</div>
            <div class="key-item"><kbd>Shift</kbd> Select 键</div>
        </div>
    </div>

    <div class="links">
        <a href="https://github.com/Cabriter/gb-2048" target="_blank">GitHub 仓库</a>
        <a href="https://github.com/Cabriter/gb-2048/releases" target="_blank">所有版本</a>
        <a href="https://github.com/Cabriter/gb-2048/blob/main/README.md" target="_blank">使用说明</a>
    </div>

    <div id="error" class="error" style="display: none;"></div>

    <script>
        // 配置
        const GAME_ROM = '2048.gb';
        
        // 获取最新 release 信息
        async function fetchLatestRelease() {
            try {
                const response = await fetch('https://api.github.com/repos/Cabriter/gb-2048/releases/latest');
                const release = await response.json();
                
                document.getElementById('versionInfo').textContent = `当前版本：${release.tag_name} | ${new Date(release.published_at).toLocaleDateString('zh-CN')}`;
                
                // 查找 .gb 文件
                const gbAsset = release.assets.find(asset => asset.name.endsWith('.gb'));
                if (gbAsset) {
                    return gbAsset.browser_download_url;
                }
                
                return null;
            } catch (error) {
                console.error('获取版本信息失败:', error);
                document.getElementById('versionInfo').textContent = '版本信息加载失败';
                return null;
            }
        }

        // 显示错误
        function showError(message) {
            const errorEl = document.getElementById('error');
            errorEl.textContent = '⚠️ ' + message;
            errorEl.style.display = 'block';
        }

        // 加载模拟器 - 使用 iframe 方式
        function loadEmulator(romUrl) {
            const gameDiv = document.getElementById('game');
            
            // 使用 EmulatorJS iframe 方式
            gameDiv.innerHTML = '';
            gameDiv.style.width = '100%';
            gameDiv.style.maxWidth = '640px';
            gameDiv.style.aspectRatio = '5.5/4';
            gameDiv.style.background = '#000';
            
            const iframe = document.createElement('iframe');
            iframe.style.width = '100%';
            iframe.style.height = '100%';
            iframe.style.border = 'none';
            iframe.allowFullscreen = true;
            iframe.allow = 'gamepad';
            iframe.sandbox = 'allow-scripts allow-same-origin allow-pointer-lock allow-forms';
            
            // 使用 EmulatorJS 官方 demo 页面格式
            const emulatorUrl = `https://demo.emulatorjs.org/?core=gb&rom=${encodeURIComponent(romUrl)}`;
            iframe.src = emulatorUrl;
            
            gameDiv.appendChild(iframe);
            
            iframe.onload = () => {
                console.log('EmulatorJS iframe 加载成功');
            };
            
            iframe.onerror = () => {
                showError('模拟器加载失败，请检查网络连接或稍后重试');
            };

            // 超时处理
            setTimeout(() => {
                if (!iframe.contentWindow) {
                    showError('模拟器加载超时，请刷新页面重试');
                }
            }, 15000);
        }

        // 初始化
        async function init() {
            const isLocal = window.location.hostname === 'localhost' || 
                           window.location.hostname === '127.0.0.1' ||
                           window.location.protocol === 'file:';

            if (isLocal) {
                // 本地测试模式
                document.getElementById('versionInfo').textContent = '本地测试模式 - 请确保 2048.gb 文件在同一目录';
                loadEmulator(GAME_ROM);
            } else {
                // GitHub Pages 模式 - 使用最新的 release
                const romUrl = await fetchLatestRelease();
                if (romUrl) {
                    loadEmulator(romUrl);
                } else {
                    // 回退到本地文件
                    showError('无法获取最新版本信息，请确保已下载 ROM 文件');
                    loadEmulator(GAME_ROM);
                }
            }
        }

        // 启动
        init();
    </script>
</body>
</html>
