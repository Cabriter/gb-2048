<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2048 Game Boy - 在线游玩</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            color: #fff;
        }

        h1 {
            margin-bottom: 10px;
            font-size: 2rem;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }

        .version-info {
            background: rgba(255,255,255,0.1);
            padding: 8px 16px;
            border-radius: 20px;
            margin-bottom: 20px;
            font-size: 0.9rem;
        }

        .game-container {
            background: #2d2d44;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
        }

        #game-container {
            width: 640px;
            height: 576px;
            max-width: 100%;
        }

        .controls-info {
            margin-top: 20px;
            background: rgba(255,255,255,0.1);
            padding: 15px 25px;
            border-radius: 10px;
            text-align: center;
        }

        .controls-info h3 {
            margin-bottom: 10px;
            font-size: 1.1rem;
        }

        .key-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 10px;
            margin-top: 10px;
        }

        .key-item {
            background: rgba(255,255,255,0.1);
            padding: 8px 12px;
            border-radius: 5px;
            font-size: 0.85rem;
        }

        .key-item kbd {
            background: #4a4a6a;
            padding: 3px 8px;
            border-radius: 4px;
            font-family: monospace;
            margin-right: 5px;
        }

        .links {
            margin-top: 20px;
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .links a {
            color: #4fc3f7;
            text-decoration: none;
            padding: 8px 16px;
            background: rgba(79, 195, 247, 0.1);
            border-radius: 20px;
            transition: all 0.3s;
        }

        .links a:hover {
            background: rgba(79, 195, 247, 0.2);
            transform: translateY(-2px);
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: #888;
        }

        .loading-spinner {
            border: 3px solid rgba(255,255,255,0.1);
            border-top-color: #4fc3f7;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 15px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .error {
            background: rgba(244, 67, 54, 0.2);
            border: 1px solid #f44336;
            padding: 15px 20px;
            border-radius: 10px;
            margin-top: 20px;
            color: #ef5350;
        }

        @media (max-width: 600px) {
            h1 { font-size: 1.5rem; }
            .game-container { padding: 10px; }
            #game-container { width: 100%; height: auto; aspect-ratio: 10/9; }
        }
    </style>
</head>
<body>
    <h1>🎮 2048 Game Boy</h1>
    <div class="version-info" id="versionInfo">正在加载游戏...</div>

    <div class="game-container">
        <div id="game-container">
            <div class="loading">
                <div class="loading-spinner"></div>
                <div>正在加载模拟器...</div>
            </div>
        </div>
    </div>

    <div class="controls-info">
        <h3>🎯 操作说明</h3>
        <div class="key-grid">
            <div class="key-item"><kbd>↑↓←→</kbd> 方向键移动</div>
            <div class="key-item"><kbd>Z</kbd> A 键 (开始/重置)</div>
            <div class="key-item"><kbd>X</kbd> B 键</div>
            <div class="key-item"><kbd>Enter</kbd> Start 键</div>
            <div class="key-item"><kbd>Shift</kbd> Select 键</div>
        </div>
    </div>

    <div class="links">
        <a href="https://github.com/Cabriter/gb-2048" target="_blank">GitHub 仓库</a>
        <a href="https://github.com/Cabriter/gb-2048/releases" target="_blank">所有版本</a>
        <a href="https://github.com/Cabriter/gb-2048/blob/main/README.md" target="_blank">使用说明</a>
    </div>

    <div id="error" class="error" style="display: none;"></div>

    <script>
        // 显示错误
        function showError(message) {
            const errorEl = document.getElementById('error');
            errorEl.textContent = '⚠️ ' + message;
            errorEl.style.display = 'block';
        }

        // 加载 EmulatorJS
        function loadEmulatorJS() {
            return new Promise((resolve, reject) => {
                const script = document.createElement('script');
                script.src = 'https://cdn.emulatorjs.org/stable/data/emulator.min.js';
                script.onload = resolve;
                script.onerror = () => reject(new Error('EmulatorJS 加载失败'));
                document.head.appendChild(script);
            });
        }

        // 初始化模拟器
        async function initEmulator() {
            try {
                // 等待 EmulatorJS 加载
                await loadEmulatorJS();
                
                // 配置 EmulatorJS
                window.EJS_player = '#game-container';
                window.EJS_gameUrl = '2048.gb';
                window.EJS_core = 'gb';
                window.EJS_pathtodata = 'https://cdn.emulatorjs.org/stable/data/';
                window.EJS_startOnLoaded = true;
                window.EJS_fullscreenOnLoaded = false;
                window.EJS_color = '#4fc3f7';
                
                console.log('EmulatorJS 配置完成，开始加载...');
                
                // 更新状态
                document.getElementById('versionInfo').textContent = '游戏加载中...';
            } catch (error) {
                console.error('初始化失败:', error);
                showError('模拟器初始化失败：' + error.message);
            }
        }

        // 启动
        initEmulator();
    </script>
</body>
</html>
