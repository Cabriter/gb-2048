<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="rom-version" content="v0.9.3">
    <title>2048 Game Boy - 在线游玩</title>
    <!-- 加载 pako 用于 gzip 解压 -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pako/2.1.0/pako.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            color: #fff;
        }
        h1 { margin-bottom: 10px; font-size: 2rem; }
        .version-info {
            background: rgba(255,255,255,0.1);
            padding: 8px 16px;
            border-radius: 20px;
            margin-bottom: 20px;
        }
        .game-frame {
            background: #2d2d44;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
        }
        #game-container {
            width: 640px;
            height: 576px;
            max-width: 100%;
            background: #000;
            border-radius: 10px;
            overflow: hidden;
        }
        .controls-info {
            margin-top: 20px;
            background: rgba(255,255,255,0.1);
            padding: 15px 25px;
            border-radius: 10px;
            text-align: center;
        }
        .key-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
            gap: 10px;
            margin-top: 10px;
        }
        .key-item {
            background: rgba(255,255,255,0.1);
            padding: 8px 12px;
            border-radius: 5px;
            font-size: 0.85rem;
        }
        .key-item kbd {
            background: #4a4a6a;
            padding: 3px 8px;
            border-radius: 4px;
            font-family: monospace;
            margin-right: 5px;
        }
        .links {
            margin-top: 20px;
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            justify-content: center;
        }
        .links a {
            color: #4fc3f7;
            text-decoration: none;
            padding: 8px 16px;
            background: rgba(79, 195, 247, 0.1);
            border-radius: 20px;
        }
        .error {
            background: rgba(244, 67, 54, 0.2);
            border: 1px solid #f44336;
            padding: 15px 20px;
            border-radius: 10px;
            margin-top: 20px;
            color: #ef5350;
            display: none;
        }
        .loading {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100%;
            color: #888;
        }
    </style>
</head>
<body>
    <h1>🎮 2048 Game Boy</h1>
    <div class="version-info" id="versionInfo">正在加载游戏...</div>

    <div class="game-frame">
        <div id="game-container">
            <div class="loading">正在加载模拟器...</div>
        </div>
    </div>

    <div class="controls-info">
        <h3>🎯 操作说明</h3>
        <div class="key-grid">
            <div class="key-item"><kbd>↑↓←→</kbd> 方向键</div>
            <div class="key-item"><kbd>Z</kbd> A 键</div>
            <div class="key-item"><kbd>X</kbd> B 键</div>
            <div class="key-item"><kbd>Enter</kbd> Start</div>
            <div class="key-item"><kbd>Shift</kbd> Select</div>
        </div>
    </div>

    <div class="links">
        <a href="https://github.com/Cabriter/gb-2048" target="_blank">GitHub</a>
        <a href="https://github.com/Cabriter/gb-2048/releases" target="_blank">Releases</a>
    </div>

    <div id="error" class="error"></div>

    <script>
        // 获取版本化的 ROM 文件名
        function getRomFilename() {
            const metaVersion = document.querySelector('meta[name="rom-version"]');
            if (metaVersion) {
                return `2048-${metaVersion.content}.gb`;
            }
            return '2048.gb';
        }
        
        const ROM_FILE = getRomFilename();
        let ROM_BLOB_URL = null;
        
        // 下载并解压 ROM 文件
        async function downloadAndDecompressRom() {
            const versionInfo = document.getElementById('versionInfo');
            versionInfo.textContent = '正在下载 ROM...';
            
            try {
                // 下载压缩的 ROM 文件
                const response = await fetch(ROM_FILE);
                if (!response.ok) {
                    throw new Error(`下载失败：HTTP ${response.status}`);
                }
                
                const compressedBuffer = await response.arrayBuffer();
                console.log(`下载的压缩数据：${compressedBuffer.byteLength} bytes`);
                
                // 检查是否是 gzip 格式 (magic number: 1f 8b)
                const dataView = new DataView(compressedBuffer);
                const isGzip = dataView.getUint8(0) === 0x1f && dataView.getUint8(1) === 0x8b;
                console.log(`是 gzip 格式：${isGzip}`);
                
                let romBuffer;
                if (isGzip) {
                    // 使用 pako 解压 gzip
                    versionInfo.textContent = '正在解压 ROM...';
                    const uint8Array = new Uint8Array(compressedBuffer);
                    romBuffer = pako.inflate(uint8Array).buffer;
                    console.log(`解压后大小：${romBuffer.byteLength} bytes`);
                } else {
                    // 不是 gzip，直接使用
                    romBuffer = compressedBuffer;
                    console.log(`原始 ROM 大小：${romBuffer.byteLength} bytes`);
                }
                
                // 创建 Blob URL
                const blob = new Blob([romBuffer], { type: 'application/octet-stream' });
                ROM_BLOB_URL = URL.createObjectURL(blob);
                console.log('ROM Blob URL 创建成功');
                
                return ROM_BLOB_URL;
                
            } catch (error) {
                console.error('ROM 下载/解压失败:', error);
                throw error;
            }
        }
        
        // 加载 EmulatorJS
        async function loadEmulator() {
            const versionInfo = document.getElementById('versionInfo');
            const errorEl = document.getElementById('error');
            const container = document.getElementById('game-container');
            
            try {
                // 下载并解压 ROM
                const romUrl = await downloadAndDecompressRom();
                
                // 加载 EmulatorJS
                versionInfo.textContent = '正在加载模拟器...';
                await new Promise((resolve, reject) => {
                    const script = document.createElement('script');
                    script.src = 'https://cdn.emulatorjs.org/stable/data/emulator.min.js';
                    script.onload = resolve;
                    script.onerror = () => reject(new Error('EmulatorJS 加载失败'));
                    document.head.appendChild(script);
                });
                
                versionInfo.textContent = '正在启动游戏...';
                
                // 等待初始化
                await new Promise(r => setTimeout(r, 500));
                
                // 配置 - 使用 Blob URL
                window.EJS_player = '#game-container';
                window.EJS_gameUrl = romUrl;
                window.EJS_core = 'gb';
                window.EJS_pathtodata = 'https://cdn.emulatorjs.org/stable/data/';
                window.EJS_startOnLoaded = true;
                window.EJS_color = '#4fc3f7';
                
                console.log('EmulatorJS 配置完成，ROM URL:', romUrl);
                
                // 等待渲染
                let checkCount = 0;
                const checkCanvas = setInterval(() => {
                    checkCount++;
                    if (document.querySelector('#game-container canvas')) {
                        clearInterval(checkCanvas);
                        versionInfo.textContent = '🎮 游戏运行中';
                        console.log('游戏画面已渲染');
                    }
                    if (checkCount > 60) {
                        clearInterval(checkCanvas);
                        throw new Error('游戏加载超时');
                    }
                }, 500);
                
            } catch (error) {
                console.error('加载失败:', error);
                container.innerHTML = `
                    <div style="padding: 40px; text-align: center; color: #fff;">
                        <h2 style="margin-bottom: 20px;">⚠️ 在线模拟器加载失败</h2>
                        <p style="margin-bottom: 20px;">您可以：</p>
                        <div style="display: flex; flex-direction: column; gap: 15px; align-items: center;">
                            <a href="${ROM_FILE}" download class="links" style="background: #4fc3f7; color: #000; padding: 12px 24px; border-radius: 8px; text-decoration: none; font-weight: bold;">
                                📥 下载 ROM 文件
                            </a>
                            <p style="color: #888; font-size: 0.9rem;">
                                下载后使用 <a href="https://emulatorjs.org/" target="_blank" style="color: #4fc3f7;">EmulatorJS</a> 或其他 GB 模拟器运行
                            </p>
                        </div>
                    </div>
                `;
                errorEl.style.display = 'none';
                versionInfo.textContent = '请下载报告';
            }
        }
        
        loadEmulator();
    </script>
</body>
</html>
